<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-login {
            background: #a80116;
            color: white;
            font-weight: bold;
        }

        .btn-login:hover {
            background: #8e0113;
        }

        .btn-register {
            background: #28a745;
            color: white;
            font-weight: bold;
        }

        .btn-register:hover {
            background: #218838;
        }

        .switch {
            text-align: center;
            margin-top: 10px;
        }

        .switch a {
            cursor: pointer;
            color: #a80116;
            text-decoration: none;
        }

        .switch a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="box">

    <!-- LOGIN -->
    <div id="loginForm">
        <h3>Đăng nhập</h3>
        <input type="text" id="loginUser" class="form-control mb-3" placeholder="Tên đăng nhập">
        <input type="password" id="loginPass" class="form-control mb-3" placeholder="Mật khẩu">
        <button class="btn btn-login w-100" onclick="login()">Đăng nhập</button>

        <div class="switch">
            Chưa có tài khoản?
            <a onclick="showRegister()">Đăng ký</a>
        </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none;">
        <h3>Đăng ký</h3>
        <input type="text" id="regUser" class="form-control mb-3" placeholder="Tên đăng nhập">
        <input type="password" id="regPass" class="form-control mb-3" placeholder="Mật khẩu">
        <input type="password" id="regPass2" class="form-control mb-3" placeholder="Nhập lại mật khẩu">
        <button class="btn btn-register w-100" onclick="register()">Đăng ký</button>

        <div class="switch">
            Đã có tài khoản?
            <a onclick="showLogin()">Đăng nhập</a>
        </div>
    </div>

</div>

<script>
function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

function showLogin() {
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}

function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;
    let pass2 = document.getElementById("regPass2").value;

    if (user === "" || pass === "") {
        alert("Vui lòng nhập đầy đủ!");
        return;
    }

    if (pass !== pass2) {
        alert("Mật khẩu không khớp!");
        return;
    }

    localStorage.setItem(user, pass);
    alert("Đăng ký thành công!");
    showLogin();
}

function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let storedPass = localStorage.getItem(user);

    if (storedPass === pass) {
        alert("Đăng nhập thành công!");
    } else {
        alert("Sai tài khoản hoặc mật khẩu!");
    }
}
</script>

</body>
</html>
