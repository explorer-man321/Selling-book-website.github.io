<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="booklist.html">BookStore</a>
            <a class="btn btn-outline-light" href="booklist.html">Tiếp tục mua sắm</a>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="mb-4">Thanh toán</h1>

        <div class="container">
            <div class="row justify-content-center align-items-center g-2">
                <div class="col g-5">
                    <div id = "checkout-message"></div>
                    <div id="cart-summary" class="mb-4"></div>
                </div>
                <div class="col g-5">
                    <form id="checkout-form" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="customerName" class="form-label">Họ tên</label>
                            <input type="text" class="form-control" id="customerName" required>
                            <div class="invalid-feedback">Vui lòng nhập họ tên.</div>
                        </div>
                        <div class="mb-3">
                            <label for="customerEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="customerEmail" required>
                            <div class="invalid-feedback">Vui lòng nhập email hợp lệ.</div>
                        </div>
                        <div class="mb-3">
                            <label for="customerAddress" class="form-label">Địa chỉ</label>
                            <textarea class="form-control" id="customerAddress" rows="2" required></textarea>
                            <div class="invalid-feedback">Vui lòng nhập địa chỉ giao hàng.</div>
                        </div>
                        <button type="submit" class="btn btn-primary">Xác nhận đặt hàng</button>
                    </form>
                </div>
            </div>
            
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/cart.js"></script>
    <script src="../JS/checkout.js"></script>
</body>
</html>
